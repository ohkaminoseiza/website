name: Build Regional Management Weekly Notes

on:
  push:
    branches:
      - main
    paths:
      - 'regional management/summaries/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'regional management/package-lock.json'

      - name: Install dependencies
        run: |
          cd "regional management"
          npm ci

      - name: Run build script
        run: |
          cd "regional management"
          npm run build

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 変更のあったHTMLファイルをステージング
          git add "regional management/weekly/" "regional management/index.html"
          
          # 差分がある場合のみコミット＆プッシュを実行
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-build weekly notes [skip ci]"
            git push origin main
          fi
